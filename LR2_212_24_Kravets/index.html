<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Fest 2026</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <h1 class="event-title">Music Fest 2026</h1>
        <p class="event-date">20–22 серпня • Львів</p>
    </header>
    <section class="countdown">
        <h2>До початку фестивалю:</h2>
        <div class="timer">
            <div class="time-block">
                <span class="number">10</span>
                <span class="label">днів</span>
            </div>
            <div class="time-block">
                <span class="number">05</span>
                <span class="label">годин</span>
            </div>
            <div class="time-block">
                <span class="number">30</span>
                <span class="label">хвилин</span>
            </div>
        </div>
    </section>
    <section class="program" id="program">
        <h2>Програма</h2>

        <div class="program-item">
            <h3>День 1</h3>
            <p>Відкриття фестивалю, локальні гурти</p>
        </div>

        <div class="program-item">
            <h3>День 2</h3>
            <p>Головні хедлайнери та шоу</p>
        </div>

        <div class="program-item">
            <h3>День 3</h3>
            <p>Закриття та afterparty</p>
        </div>
    </section>

    <section class="location">
        <h2>Локація</h2>
        <p>Центральний парк культури та відпочинку, Львів</p>

        <a 
            href="https://www.google.com/maps?q=Центральний+парк+культури+та+відпочинку+Львів"
            target="_blank"
            class="map-link">
            Відкрити в Google Maps
        </a>
    </section>
</body>
</html>
